<header class="site-header">
  <a class="site-brand" href="{{ "/" | relURL }}">{{ site.Title }}</a>
  <nav class="site-nav">
    {{ range site.Menus.main }}
    <a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a>
    {{ end }}
    <button class="titan-toggle" type="button" data-titan-toggle aria-pressed="true"
            title="Toggle animated background"></button>
  </nav>
</header>
