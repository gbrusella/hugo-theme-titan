name: Build & Deploy Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Hugo
        run: |
          HUGO_VERSION=0.163.1
          wget -q -O hugo.tar.gz \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz
          tar xzf hugo.tar.gz hugo
          sudo mv hugo /usr/local/bin/hugo

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Link theme into exampleSite
        run: mkdir -p exampleSite/themes && ln -sf "$(pwd)" exampleSite/themes/titan

      - name: Build
        run: hugo -s exampleSite --minify --baseURL "https://gbrusella.github.io/hugo-theme-titan/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: exampleSite/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
